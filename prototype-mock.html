<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prototype Mock</title>
<style>
  :root {
    --bg: #000000;
    --panel: #111111;
    --panel-border: #2a2a2a;
    --text: #f5f5f5;
    --muted: #8a8a8a;
    --accent: #ffffff;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
    overflow: hidden;
  }

  .stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
  }

  /* ---------- Top bar ---------- */
  .topbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    z-index: 50;
  }

  .topbar-group {
    display: flex;
    gap: 8px;
  }

  .btn {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    color: var(--text);
    font-size: 12px;
    letter-spacing: 0.02em;
    padding: 8px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease;
    font-family: inherit;
  }

  .btn:hover {
    background: #1c1c1c;
    border-color: #3a3a3a;
  }

  .btn.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }

  .btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    pointer-events: none;
  }

  .btn-icon {
    width: 36px;
    height: 36px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
  }

  /* ---------- Device frames ---------- */
  .device {
    position: relative;
    background: #0a0a0a;
    border: 1px solid #2c2c2c;
    box-shadow: 0 0 0 2px #000, 0 30px 60px rgba(0,0,0,0.6);
    transition: width 0.25s ease, height 0.25s ease, border-radius 0.25s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .device.iphone {
    width: 320px;
    height: 660px;
    border-radius: 52px;
    padding: 7px;
  }

  .device.ipad {
    width: 520px;
    height: 700px;
    border-radius: 36px;
    padding: 9px;
  }

  .device-screen {
    position: relative;
    width: 100%;
    height: 100%;
    background: #ffffff;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .iphone .device-screen { border-radius: 45px; }
  .ipad .device-screen { border-radius: 25px; }

  /* notch / dynamic island */
  .notch {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 90px;
    height: 26px;
    background: #000;
    border-radius: 16px;
    z-index: 5;
  }

  .ipad .notch {
    top: 8px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }

  /* home indicator */
  .home-indicator {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 110px;
    height: 4px;
    background: #3a3a3a;
    border-radius: 3px;
    z-index: 5;
  }

  /* ---------- Screen content ---------- */
  .screen-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
    gap: 12px;
  }

  .step-badge {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1px solid #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: #1a1a1a;
  }

  .step-label {
    font-size: 13px;
    color: #1a1a1a;
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }

  .step-line {
    width: 60px;
    height: 1px;
    background: #1a1a1a;
    margin-top: 8px;
  }

  /* ---------- In-frame nav arrows ---------- */
  .nav-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(0,0,0,0.05);
    border: 1px solid #d5d5d5;
    color: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 6;
    font-size: 14px;
    user-select: none;
  }

  .nav-arrow:hover { background: rgba(0,0,0,0.1); }
  .nav-arrow.prev { left: 12px; }
  .nav-arrow.next { right: 12px; }
  .nav-arrow.disabled { opacity: 0.25; pointer-events: none; }

  /* ---------- Progress dots (bottom bar) ---------- */
  .bottombar {
    position: fixed;
    bottom: 22px;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    z-index: 50;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #333;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.15s ease;
  }

  .dot.active {
    background: var(--accent);
    transform: scale(1.3);
  }

  /* ---------- Menu popover ---------- */
  .menu-overlay {
    position: fixed;
    inset: 0;
    background: transparent;
    display: none;
    z-index: 100;
  }

  .menu-overlay.open { display: block; }

  .menu-panel {
    position: absolute;
    top: 62px;
    left: 20px;
    width: 240px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    padding: 14px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.5);
    transform-origin: top left;
    opacity: 0;
    transform: scale(0.94) translateY(-4px);
    transition: opacity 0.14s ease, transform 0.14s ease;
  }

  .menu-overlay.open .menu-panel {
    opacity: 1;
    transform: scale(1) translateY(0);
  }

  .menu-title {
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 14px 0;
  }

  #menuItems {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .menu-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 10px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
  }

  .menu-item:hover { background: #1c1c1c; }

  .menu-item.active { background: #1c1c1c; color: var(--accent); }

  .menu-item .num {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1px solid #333;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
  }

  .menu-item.active .num {
    border-color: var(--accent);
    color: var(--accent);
  }

  .menu-title {
    margin-bottom: 10px;
  }
</style>
</head>
<body data-device="iphone" data-lang="en" data-step="1">

  <div class="topbar">
    <div class="topbar-group">
      <button class="btn btn-icon" id="menuBtn" title="Menu">&#9776;</button>
      <button class="btn" id="deviceBtn" data-i18n="deviceToggle">iPad view</button>
    </div>
    <div class="topbar-group">
      <button class="btn" id="langBtn">DE</button>
      <button class="btn" id="restartBtn" data-i18n="restart">Restart</button>
    </div>
  </div>

  <div class="stage">
    <div class="device iphone" id="device">
      <div class="device-screen">
        <div class="notch"></div>

        <div class="nav-arrow prev" id="prevBtn">&#8592;</div>
        <div class="nav-arrow next" id="nextBtn">&#8594;</div>

        <div class="screen-content">
          <div class="step-badge" id="stepBadge">1</div>
          <div class="step-label" id="stepLabel" data-i18n="stepLabel">Step 1</div>
          <div class="step-line"></div>
        </div>

        <div class="home-indicator"></div>
      </div>
    </div>
  </div>

  <div class="bottombar" id="dots"></div>

  <div class="menu-overlay" id="menuOverlay">
    <div class="menu-panel" id="menuPanel">
      <p class="menu-title" data-i18n="menuTitle">Steps</p>
      <div id="menuItems"></div>
    </div>
  </div>

<script>
(function () {
  const TOTAL_STEPS = 3;

  const i18n = {
    en: {
      deviceToggleToIpad: "iPad view",
      deviceToggleToIphone: "iPhone view",
      restart: "Restart",
      menuTitle: "Steps",
      step: (n) => `Step ${n}`
    },
    de: {
      deviceToggleToIpad: "iPad-Ansicht",
      deviceToggleToIphone: "iPhone-Ansicht",
      restart: "Neustart",
      menuTitle: "Schritte",
      step: (n) => `Schritt ${n}`
    }
  };

  const state = {
    device: "iphone",
    lang: "en",
    step: 1
  };

  const body = document.body;
  const deviceEl = document.getElementById("device");
  const deviceBtn = document.getElementById("deviceBtn");
  const langBtn = document.getElementById("langBtn");
  const restartBtn = document.getElementById("restartBtn");
  const menuBtn = document.getElementById("menuBtn");
  const menuOverlay = document.getElementById("menuOverlay");
  const menuPanel = document.getElementById("menuPanel");
  const menuItems = document.getElementById("menuItems");
  const menuTitleEl = document.querySelector('[data-i18n="menuTitle"]');
  const stepBadge = document.getElementById("stepBadge");
  const stepLabel = document.getElementById("stepLabel");
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
  const dotsEl = document.getElementById("dots");

  function t() {
    return i18n[state.lang];
  }

  function buildDots() {
    dotsEl.innerHTML = "";
    for (let i = 1; i <= TOTAL_STEPS; i++) {
      const dot = document.createElement("div");
      dot.className = "dot" + (i === state.step ? " active" : "");
      dot.addEventListener("click", () => goToStep(i));
      dotsEl.appendChild(dot);
    }
  }

  function buildMenu() {
    menuItems.innerHTML = "";
    for (let i = 1; i <= TOTAL_STEPS; i++) {
      const item = document.createElement("div");
      item.className = "menu-item" + (i === state.step ? " active" : "");
      item.innerHTML = `<span class="num">${i}</span><span>${t().step(i)}</span>`;
      item.addEventListener("click", () => {
        goToStep(i);
        closeMenu();
      });
      menuItems.appendChild(item);
    }
  }

  function render() {
    // device frame
    deviceEl.className = "device " + state.device;
    deviceBtn.textContent = state.device === "iphone"
      ? t().deviceToggleToIpad
      : t().deviceToggleToIphone;

    // language button shows the *other* language to switch to
    langBtn.textContent = state.lang === "en" ? "DE" : "EN";

    // restart / labels
    restartBtn.textContent = t().restart;
    restartBtn.disabled = state.step === 1;
    menuTitleEl.textContent = t().menuTitle;

    // step content
    stepBadge.textContent = state.step;
    stepLabel.textContent = t().step(state.step);

    // nav arrows
    prevBtn.classList.toggle("disabled", state.step === 1);
    nextBtn.classList.toggle("disabled", state.step === TOTAL_STEPS);

    buildDots();
    buildMenu();
  }

  function goToStep(n) {
    if (n < 1 || n > TOTAL_STEPS) return;
    state.step = n;
    render();
  }

  function openMenu() {
    buildMenu();
    menuOverlay.classList.add("open");
    menuBtn.classList.add("active");
  }

  function closeMenu() {
    menuOverlay.classList.remove("open");
    menuBtn.classList.remove("active");
  }

  deviceBtn.addEventListener("click", () => {
    state.device = state.device === "iphone" ? "ipad" : "iphone";
    render();
  });

  langBtn.addEventListener("click", () => {
    state.lang = state.lang === "en" ? "de" : "en";
    render();
  });

  restartBtn.addEventListener("click", () => {
    state.step = 1;
    render();
  });

  menuBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    if (menuOverlay.classList.contains("open")) {
      closeMenu();
    } else {
      openMenu();
    }
  });

  menuOverlay.addEventListener("click", (e) => {
    if (!menuPanel.contains(e.target)) closeMenu();
  });

  prevBtn.addEventListener("click", () => goToStep(state.step - 1));
  nextBtn.addEventListener("click", () => goToStep(state.step + 1));

  document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight") goToStep(state.step + 1);
    if (e.key === "ArrowLeft") goToStep(state.step - 1);
    if (e.key === "Escape") closeMenu();
  });

  render();
})();
</script>
</body>
</html>
