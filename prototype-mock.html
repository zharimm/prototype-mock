<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prototype Mock</title>
<style>
  :root {
    --bg: #000000;
    --panel: #111111;
    --panel-border: #2a2a2a;
    --text: #f5f5f5;
    --muted: #8a8a8a;
    --accent: #ffffff;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
    overflow: hidden;
  }

  .stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
  }

  /* ---------- Top bar ---------- */
  .topbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    z-index: 50;
  }

  .topbar-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #apiKeyRow {
    display: flex;
    align-items: center;
  }

  .btn {
    height: 36px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    color: var(--text);
    font-size: 12px;
    letter-spacing: 0.02em;
    padding: 0 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease;
    font-family: inherit;
  }

  .btn:hover {
    background: #1c1c1c;
    border-color: #3a3a3a;
  }

  .btn.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }

  .btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    pointer-events: none;
  }

  .btn-icon {
    width: 36px;
    height: 36px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    font-size: 15px;
  }

  /* ---------- Device frames ---------- */
  .device {
    position: relative;
    background: #0a0a0a;
    border: 1px solid #2c2c2c;
    box-shadow: 0 0 0 2px #000, 0 30px 60px rgba(0,0,0,0.6);
    transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), height 0.3s cubic-bezier(0.4, 0, 0.2, 1), border-radius 0.3s cubic-bezier(0.4, 0, 0.2, 1), transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .device.iphone {
    width: 320px;
    height: 660px;
    border-radius: 52px;
    padding: 7px;
  }

  .device.ipad {
    width: 520px;
    height: 700px;
    border-radius: 36px;
    padding: 9px;
  }

  /* Landscape rotates the whole device (frame, notch, home indicator)
     counter-clockwise (to the left) as one rigid body — the
     counter-rotated .screen-overlay below keeps the actual UI content
     upright. */
  .device.landscape {
    transform: rotate(-90deg);
  }

  .device-screen {
    position: relative;
    width: 100%;
    height: 100%;
    background: #ffffff;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    z-index: 1;
  }

  .iphone .device-screen { border-radius: 45px; }
  .ipad .device-screen { border-radius: 25px; }

  /* notch / dynamic island — rotates naturally with .device, no
     orientation-specific overrides needed */
  .notch {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 90px;
    height: 26px;
    background: #000;
    border-radius: 16px;
    z-index: 5;
  }

  .ipad .notch {
    top: 8px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }

  /* home indicator — rotates naturally with .device */
  .home-indicator {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 110px;
    height: 4px;
    background: #3a3a3a;
    border-radius: 3px;
    z-index: 5;
  }

  /* ---------- Screen overlay (upright UI content) ----------
     Sibling of .device-screen, not a descendant, so it isn't clipped
     by .device-screen's overflow:hidden. Sized to the exact inner
     screen dimensions and counter-rotated in landscape so its content
     always renders upright while the frame around it is rotated. */
  .screen-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    display: flex;
    flex-direction: column;
    transform: translate(-50%, -50%);
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1), height 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 2;
  }

  .device.iphone .screen-overlay { width: 306px; height: 646px; }
  .device.ipad .screen-overlay { width: 502px; height: 682px; }

  .device.iphone.landscape .screen-overlay {
    width: 646px;
    height: 306px;
    transform: translate(-50%, -50%) rotate(90deg);
  }

  .device.ipad.landscape .screen-overlay {
    width: 682px;
    height: 502px;
    transform: translate(-50%, -50%) rotate(90deg);
  }

  /* ---------- Screen content ---------- */
  .screen-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
    gap: 12px;
  }

  .device.landscape .screen-content {
    padding: 24px 40px;
  }

  .step-badge {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1px solid #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: #1a1a1a;
  }

  .step-label {
    font-size: 13px;
    color: #1a1a1a;
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }

  .step-line {
    width: 60px;
    height: 1px;
    background: #1a1a1a;
    margin-top: 8px;
  }

  /* ---------- Nav arrows (outside the device, flanking it) ----------
     Positioned via JS (positionNavArrows()) relative to #stage, based on
     the device's current bounding box, so they track its size/orientation.
     left/top transition alongside the device's own rotate/resize so both
     move in sync. */
  .nav-arrow {
    position: absolute;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 40;
    font-size: 16px;
    user-select: none;
    transform: translateY(-50%);
    transition: left 0.4s cubic-bezier(0.4, 0, 0.2, 1), top 0.4s cubic-bezier(0.4, 0, 0.2, 1), background 0.15s ease, border-color 0.15s ease;
  }

  .nav-arrow:hover { background: #1c1c1c; border-color: #3a3a3a; }
  .nav-arrow.disabled { opacity: 0.25; pointer-events: none; }

  /* ---------- Progress dots (bottom bar) ---------- */
  .bottombar {
    position: fixed;
    bottom: 22px;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    z-index: 50;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #333;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.15s ease;
  }

  .dot.active {
    background: var(--accent);
    transform: scale(1.3);
  }

  /* ---------- Popovers (shared) ---------- */
  .menu-overlay {
    position: fixed;
    inset: 0;
    background: transparent;
    display: none;
    z-index: 100;
  }

  .menu-overlay.open { display: block; }

  .menu-panel {
    position: absolute;
    top: 62px;
    left: 20px;
    width: 240px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    padding: 14px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.5);
    transform-origin: top left;
    opacity: 0;
    transform: scale(0.94) translateY(-4px);
    transition: opacity 0.14s ease, transform 0.14s ease;
  }

  .menu-overlay.open .menu-panel {
    opacity: 1;
    transform: scale(1) translateY(0);
  }

  .menu-title {
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 10px 0;
  }

  #menuItems {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .menu-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 10px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
  }

  .menu-item:hover { background: #1c1c1c; }

  .menu-item.active { background: #1c1c1c; color: var(--accent); }

  .menu-item .num {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1px solid #333;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
  }

  .menu-item.active .num {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ---------- Settings popover ---------- */
  .settings-panel {
    width: 260px;
  }

  .settings-section {
    margin-bottom: 16px;
  }

  .settings-section:last-child {
    margin-bottom: 0;
  }

  .settings-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin: 0 0 8px 0;
  }

  .segmented {
    display: flex;
    gap: 2px;
    background: #1a1a1a;
    border: 1px solid var(--panel-border);
    border-radius: 10px;
    padding: 2px;
  }

  .segmented button {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 12px;
    padding: 8px 0;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s ease, color 0.15s ease;
  }

  .segmented button:hover { color: var(--text); }

  .segmented button.active {
    background: var(--accent);
    color: #000;
  }

  .apikey-chip {
    height: 36px;
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 20px;
    padding: 0 8px 0 14px;
  }

  .apikey-chip .value {
    color: var(--text);
    font-family: "SF Mono", Menlo, monospace;
    font-size: 13px;
    letter-spacing: 0.04em;
  }

  .apikey-remove {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    padding: 3px 7px;
    border-radius: 6px;
    line-height: 1;
  }

  .apikey-remove:hover {
    color: #ff8080;
    background: rgba(255,255,255,0.06);
  }

  /* ---------- API key entry popover ---------- */
  .apikey-panel {
    width: 220px;
  }

  .apikey-input {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid var(--panel-border);
    color: var(--text);
    font-size: 13px;
    padding: 10px 12px;
    border-radius: 10px;
    font-family: inherit;
    margin-bottom: 12px;
    outline: none;
  }

  .apikey-input:focus {
    border-color: var(--accent);
  }

  .apikey-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .apikey-actions .btn {
    padding: 6px 12px;
    font-size: 12px;
  }
</style>
</head>
<body data-device="iphone" data-lang="en" data-step="1">

  <div class="topbar">
    <div class="topbar-group">
      <button class="btn btn-icon" id="menuBtn" title="Menu">&#9776;</button>
      <button class="btn" id="settingsBtn" data-i18n="settingsTitle">Settings</button>
      <div id="apiKeyRow"></div>
    </div>
    <div class="topbar-group">
      <button class="btn" id="orientationBtn" data-i18n="rotate">Rotate</button>
      <button class="btn" id="restartBtn" data-i18n="restart">Restart</button>
    </div>
  </div>

  <div class="stage" id="stage">
    <div class="nav-arrow prev" id="prevBtn">&#8592;</div>

    <div class="device iphone" id="device">
      <div class="device-screen">
        <div class="notch"></div>
        <div class="home-indicator"></div>
      </div>

      <div class="screen-overlay" id="screenOverlay">
        <div class="screen-content">
          <div class="step-badge" id="stepBadge">1</div>
          <div class="step-label" id="stepLabel" data-i18n="stepLabel">Step 1</div>
          <div class="step-line"></div>
        </div>
      </div>
    </div>

    <div class="nav-arrow next" id="nextBtn">&#8594;</div>
  </div>

  <div class="bottombar" id="dots"></div>

  <div class="menu-overlay" id="menuOverlay">
    <div class="menu-panel" id="menuPanel">
      <p class="menu-title" data-i18n="menuTitle">Steps</p>
      <div id="menuItems"></div>
    </div>
  </div>

  <div class="menu-overlay" id="settingsOverlay">
    <div class="menu-panel settings-panel" id="settingsPanel">
      <p class="menu-title" data-i18n="settingsTitle">Settings</p>

      <div class="settings-section">
        <p class="settings-label" data-i18n="languageLabel">Language</p>
        <div class="segmented" id="langSegmented"></div>
      </div>

      <div class="settings-section">
        <p class="settings-label" data-i18n="deviceLabel">Device</p>
        <div class="segmented" id="deviceSegmented"></div>
      </div>
    </div>
  </div>

  <div class="menu-overlay" id="apiKeyOverlay">
    <div class="menu-panel apikey-panel" id="apiKeyPanel">
      <p class="menu-title" data-i18n="apiKeyEnterTitle">Add API Key</p>
      <input type="password" id="apiKeyInput" class="apikey-input" data-i18n-placeholder="apiKeyPlaceholder" autocomplete="off" spellcheck="false">
      <div class="apikey-actions">
        <button class="btn" id="apiKeyCancelBtn" data-i18n="cancel">Cancel</button>
        <button class="btn active" id="apiKeySaveBtn" data-i18n="save">Save</button>
      </div>
    </div>
  </div>

<script>
(function () {
  const TOTAL_STEPS = 3;
  const LANGS = ["en", "de", "fr"];

  // Portrait pixel dimensions of each device frame — kept in sync with the
  // .device.iphone / .device.ipad width/height rules in <style>.
  const DEVICE_SIZES = {
    iphone: { width: 320, height: 660 },
    ipad: { width: 520, height: 700 }
  };

  const i18n = {
    en: {
      restart: "Restart",
      rotate: "Rotate",
      menuTitle: "Steps",
      settingsTitle: "Settings",
      languageLabel: "Language",
      deviceLabel: "Device",
      apiKeyLabel: "AI API Key",
      addApiKey: "Add key",
      removeApiKey: "Remove key",
      apiKeyEnterTitle: "Add API Key",
      apiKeyPlaceholder: "sk-...",
      save: "Save",
      cancel: "Cancel",
      step: (n) => `Step ${n}`
    },
    de: {
      restart: "Neustart",
      rotate: "Drehen",
      menuTitle: "Schritte",
      settingsTitle: "Einstellungen",
      languageLabel: "Sprache",
      deviceLabel: "Gerät",
      apiKeyLabel: "KI-API-Schlüssel",
      addApiKey: "Schlüssel hinzufügen",
      removeApiKey: "Schlüssel entfernen",
      apiKeyEnterTitle: "API-Schlüssel hinzufügen",
      apiKeyPlaceholder: "sk-...",
      save: "Speichern",
      cancel: "Abbrechen",
      step: (n) => `Schritt ${n}`
    },
    fr: {
      restart: "Redémarrer",
      rotate: "Pivoter",
      menuTitle: "Étapes",
      settingsTitle: "Paramètres",
      languageLabel: "Langue",
      deviceLabel: "Appareil",
      apiKeyLabel: "Clé API IA",
      addApiKey: "Ajouter une clé",
      removeApiKey: "Supprimer la clé",
      apiKeyEnterTitle: "Ajouter une clé API",
      apiKeyPlaceholder: "sk-...",
      save: "Enregistrer",
      cancel: "Annuler",
      step: (n) => `Étape ${n}`
    }
  };

  const state = {
    device: "iphone",
    orientation: "portrait",
    lang: "en",
    step: 1,
    apiKey: null
  };

  const stageEl = document.getElementById("stage");
  const deviceEl = document.getElementById("device");
  const restartBtn = document.getElementById("restartBtn");
  const orientationBtn = document.getElementById("orientationBtn");

  const menuBtn = document.getElementById("menuBtn");
  const menuOverlay = document.getElementById("menuOverlay");
  const menuPanel = document.getElementById("menuPanel");
  const menuItems = document.getElementById("menuItems");

  const settingsBtn = document.getElementById("settingsBtn");
  const settingsOverlay = document.getElementById("settingsOverlay");
  const settingsPanel = document.getElementById("settingsPanel");
  const langSegmented = document.getElementById("langSegmented");
  const deviceSegmented = document.getElementById("deviceSegmented");
  const apiKeyRow = document.getElementById("apiKeyRow");

  const apiKeyOverlay = document.getElementById("apiKeyOverlay");
  const apiKeyPanel = document.getElementById("apiKeyPanel");
  const apiKeyInput = document.getElementById("apiKeyInput");
  const apiKeyCancelBtn = document.getElementById("apiKeyCancelBtn");
  const apiKeySaveBtn = document.getElementById("apiKeySaveBtn");

  const stepBadge = document.getElementById("stepBadge");
  const stepLabel = document.getElementById("stepLabel");
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
  const dotsEl = document.getElementById("dots");

  function t() {
    return i18n[state.lang];
  }

  function maskKey(key) {
    return "•".repeat(8) + key.slice(-4);
  }

  function applyStaticI18n() {
    document.querySelectorAll("[data-i18n]").forEach((el) => {
      const key = el.getAttribute("data-i18n");
      const val = t()[key];
      if (typeof val === "string") el.textContent = val;
    });
    document.querySelectorAll("[data-i18n-placeholder]").forEach((el) => {
      const key = el.getAttribute("data-i18n-placeholder");
      const val = t()[key];
      if (typeof val === "string") el.placeholder = val;
    });
  }

  function positionNavArrows() {
    // Computed analytically from state (not deviceEl.getBoundingClientRect())
    // because the device is mid-CSS-transition when render() runs — reading
    // its live rect at that instant would return the *pre*-transition box,
    // putting the arrows a step behind (visible as "arrows only catch up on
    // the next click"). The device only ever rotates in 90deg increments,
    // so its on-screen footprint is fully determined by state.device/orientation.
    const base = DEVICE_SIZES[state.device];
    const rotated = state.orientation === "landscape";
    const boxWidth = rotated ? base.height : base.width;

    const stageRect = stageEl.getBoundingClientRect();
    const gap = 28;
    const arrowSize = 40;
    const centerX = stageRect.width / 2;
    const centerY = stageRect.height / 2;

    prevBtn.style.top = centerY + "px";
    nextBtn.style.top = centerY + "px";
    prevBtn.style.left = (centerX - boxWidth / 2 - gap - arrowSize) + "px";
    nextBtn.style.left = (centerX + boxWidth / 2 + gap) + "px";
  }

  function buildDots() {
    dotsEl.innerHTML = "";
    for (let i = 1; i <= TOTAL_STEPS; i++) {
      const dot = document.createElement("div");
      dot.className = "dot" + (i === state.step ? " active" : "");
      dot.addEventListener("click", () => goToStep(i));
      dotsEl.appendChild(dot);
    }
  }

  function buildMenu() {
    menuItems.innerHTML = "";
    for (let i = 1; i <= TOTAL_STEPS; i++) {
      const item = document.createElement("div");
      item.className = "menu-item" + (i === state.step ? " active" : "");
      item.innerHTML = `<span class="num">${i}</span><span>${t().step(i)}</span>`;
      item.addEventListener("click", () => {
        goToStep(i);
        closeMenu();
      });
      menuItems.appendChild(item);
    }
  }

  function buildSettingsPanel() {
    // language segmented control
    langSegmented.innerHTML = "";
    LANGS.forEach((code) => {
      const b = document.createElement("button");
      b.type = "button";
      b.textContent = code.toUpperCase();
      b.className = state.lang === code ? "active" : "";
      b.addEventListener("click", () => {
        state.lang = code;
        render();
      });
      langSegmented.appendChild(b);
    });

    // device segmented control
    deviceSegmented.innerHTML = "";
    [["iphone", "iPhone"], ["ipad", "iPad"]].forEach(([value, label]) => {
      const b = document.createElement("button");
      b.type = "button";
      b.textContent = label;
      b.className = state.device === value ? "active" : "";
      b.addEventListener("click", () => {
        state.device = value;
        render();
      });
      deviceSegmented.appendChild(b);
    });
  }

  function buildApiKeyButton() {
    apiKeyRow.innerHTML = "";
    if (state.apiKey) {
      const chip = document.createElement("div");
      chip.className = "apikey-chip";

      const value = document.createElement("span");
      value.className = "value";
      value.textContent = maskKey(state.apiKey);

      const removeBtn = document.createElement("button");
      removeBtn.type = "button";
      removeBtn.className = "apikey-remove";
      removeBtn.textContent = "✕";
      removeBtn.title = t().removeApiKey;
      removeBtn.addEventListener("click", () => {
        state.apiKey = null;
        render();
      });

      chip.appendChild(value);
      chip.appendChild(removeBtn);
      apiKeyRow.appendChild(chip);
    } else {
      const addBtn = document.createElement("button");
      addBtn.type = "button";
      addBtn.className = "btn";
      addBtn.textContent = t().addApiKey;
      addBtn.addEventListener("click", () => openApiKeyPopover(addBtn));
      apiKeyRow.appendChild(addBtn);
    }
  }

  function render() {
    // device frame
    deviceEl.className = "device " + state.device + (state.orientation === "landscape" ? " landscape" : "");

    // restart
    restartBtn.disabled = state.step === 1;

    // step content
    stepBadge.textContent = state.step;
    stepLabel.textContent = t().step(state.step);

    // nav arrows
    prevBtn.classList.toggle("disabled", state.step === 1);
    nextBtn.classList.toggle("disabled", state.step === TOTAL_STEPS);

    applyStaticI18n();
    buildDots();
    buildMenu();
    buildSettingsPanel();
    buildApiKeyButton();
    positionNavArrows();
  }

  function goToStep(n) {
    if (n < 1 || n > TOTAL_STEPS) return;
    state.step = n;
    render();
  }

  function openMenu() {
    closeSettings();
    buildMenu();
    menuOverlay.classList.add("open");
    menuBtn.classList.add("active");
  }

  function closeMenu() {
    menuOverlay.classList.remove("open");
    menuBtn.classList.remove("active");
  }

  function openSettings() {
    closeMenu();
    buildSettingsPanel();
    settingsOverlay.classList.add("open");
    settingsBtn.classList.add("active");
  }

  function closeSettings() {
    settingsOverlay.classList.remove("open");
    settingsBtn.classList.remove("active");
    closeApiKeyPopover();
  }

  function openApiKeyPopover(anchorEl) {
    apiKeyInput.value = "";
    apiKeyOverlay.classList.add("open");
    const rect = anchorEl.getBoundingClientRect();
    apiKeyPanel.style.top = (rect.bottom + 8) + "px";
    apiKeyPanel.style.left = rect.left + "px";
    setTimeout(() => apiKeyInput.focus(), 50);
  }

  function closeApiKeyPopover() {
    apiKeyOverlay.classList.remove("open");
  }

  function saveApiKey() {
    const value = apiKeyInput.value.trim();
    if (value) state.apiKey = value;
    closeApiKeyPopover();
    render();
  }

  restartBtn.addEventListener("click", () => {
    state.step = 1;
    render();
  });

  orientationBtn.addEventListener("click", () => {
    state.orientation = state.orientation === "portrait" ? "landscape" : "portrait";
    render();
  });

  menuBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    menuOverlay.classList.contains("open") ? closeMenu() : openMenu();
  });

  menuOverlay.addEventListener("click", (e) => {
    if (!menuPanel.contains(e.target)) closeMenu();
  });

  settingsBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    settingsOverlay.classList.contains("open") ? closeSettings() : openSettings();
  });

  settingsOverlay.addEventListener("click", (e) => {
    if (!settingsPanel.contains(e.target)) closeSettings();
  });

  apiKeyOverlay.addEventListener("click", (e) => {
    if (!apiKeyPanel.contains(e.target)) closeApiKeyPopover();
  });

  apiKeyCancelBtn.addEventListener("click", closeApiKeyPopover);
  apiKeySaveBtn.addEventListener("click", saveApiKey);
  apiKeyInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") saveApiKey();
  });

  prevBtn.addEventListener("click", () => goToStep(state.step - 1));
  nextBtn.addEventListener("click", () => goToStep(state.step + 1));

  document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight") goToStep(state.step + 1);
    if (e.key === "ArrowLeft") goToStep(state.step - 1);
    if (e.key === "Escape") {
      if (apiKeyOverlay.classList.contains("open")) closeApiKeyPopover();
      else if (settingsOverlay.classList.contains("open")) closeSettings();
      else closeMenu();
    }
  });

  window.addEventListener("resize", positionNavArrows);

  render();
})();
</script>
</body>
</html>
